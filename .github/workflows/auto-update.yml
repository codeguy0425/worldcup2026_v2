name: Auto-Update Scores

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'   # 7am HKT
    - cron: '0 5 * * *'    # 1pm HKT

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest scores from openfootball
        run: node scripts/fetch-scores.mjs

      - name: Run computation pipeline
        run: node pipeline/update.mjs

      - name: Commit and push
        run: |
          git config user.name "WC2026 Bot"
          git config user.email "bot@worldcup2026.app"
          git add sample-data.json app/public/data/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git commit -m "auto-update scores"
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/${{ github.repository }}
          git push
